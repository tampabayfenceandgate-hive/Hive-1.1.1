<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIVE — Your Swarm. Your Rules.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
body{font-family:'Inter',sans-serif;color:#fff;display:flex;flex-direction:column;position:relative}
canvas{position:absolute;inset:0;pointer-events:none}
#stars{z-index:0}
#lightning{z-index:3}
.hc{position:absolute;z-index:1;pointer-events:none}
.hc.tl{top:0;left:0}
.hc.tr{top:0;right:0;transform:scaleX(-1)}
.hc.bl{bottom:0;left:0;transform:scaleY(-1)}
.hc.br{bottom:0;right:0;transform:scale(-1,-1)}
#header{position:relative;z-index:10;text-align:center;padding:6px 0 2px;flex-shrink:0}
#logo{font-family:'Orbitron',sans-serif;font-size:clamp(14px,2.8vw,22px);font-weight:900;letter-spacing:10px;color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.3),0 0 40px rgba(255,140,0,0.2);animation:flk 9s infinite}
@keyframes flk{0%,94%,100%{opacity:1}95%{opacity:0.65}97%{opacity:1}}
#tagline{font-size:8px;letter-spacing:4px;color:rgba(255,255,255,0.22);text-transform:uppercase;margin-top:1px}
#pods{position:relative;z-index:5;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0}
#pods-inner{display:flex;flex-direction:column;align-items:center;gap:clamp(6px,1.2vh,14px);width:100%;max-width:680px;padding:0 16px}
.row{display:flex;justify-content:space-around;width:100%;align-items:flex-end}
.pod-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.sphere{border-radius:50%;position:relative;flex-shrink:0;transition:filter 0.3s;animation:flt 4s ease-in-out infinite}
.sphere.off{opacity:0.35;animation:none;filter:none !important}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes ptxt{0%,100%{opacity:0.2}50%{opacity:1}}
.rim{position:absolute;inset:-2px;border-radius:50%;animation:spin 8s linear infinite}
.glass{position:absolute;inset:3px;border-radius:50%;backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.15);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;box-shadow:inset 0 -6px 20px rgba(0,0,0,0.5),inset 0 3px 10px rgba(255,255,255,0.06)}
.shine{position:absolute;inset:0;border-radius:50%;pointer-events:none;background:radial-gradient(circle at 28% 22%,rgba(255,255,255,0.58) 0%,rgba(255,255,255,0.12) 20%,transparent 55%)}
.pname{font-family:'Orbitron',sans-serif;font-size:clamp(8px,1.3vw,11px);font-weight:600;letter-spacing:1px;position:relative;z-index:2}
.pco{font-size:clamp(5px,0.8vw,7px);letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.35);position:relative;z-index:2}
.presp{font-size:clamp(5px,0.75vw,7px);line-height:1.4;color:rgba(255,255,255,0.7);text-align:center;padding:0 7px;max-height:28px;overflow:hidden;position:relative;z-index:2}
.pdot{position:absolute;top:7px;right:8px;width:5px;height:5px;border-radius:50%;z-index:4}
.dlink{position:absolute;bottom:5px;right:6px;width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:6px;color:rgba(255,255,255,0.3);text-decoration:none;z-index:4}
.pulse{animation:ptxt 1.3s infinite}
.ctl{display:flex;align-items:center;gap:4px}
.tog{width:22px;height:12px;border-radius:6px;cursor:pointer;position:relative;flex-shrink:0;border:none;outline:none;transition:background 0.3s}
.tog.on{background:rgba(185,225,255,0.55);box-shadow:0 0 6px rgba(185,225,255,0.6)}
.tog.off{background:rgba(255,255,255,0.12)}
.togdot{position:absolute;top:2px;width:8px;height:8px;border-radius:50%;background:#fff;transition:left 0.3s;box-shadow:0 1px 2px rgba(0,0,0,0.4)}
.dial{width:24px;height:24px;border-radius:50%;cursor:grab;flex-shrink:0;user-select:none;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.22),rgba(0,0,0,0.65));border:1px solid rgba(255,255,255,0.22);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center}
.dval{font-family:'Orbitron',sans-serif;font-size:6px;font-weight:600;pointer-events:none;color:rgba(255,255,255,0.92)}
.blend-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.blend-sphere{border-radius:50%;position:relative;flex-shrink:0;cursor:pointer;animation:flt 3.5s ease-in-out infinite;filter:drop-shadow(0 0 18px #FF8C00) drop-shadow(0 0 36px rgba(255,140,0,0.4)) drop-shadow(0 10px 24px rgba(0,0,0,0.7))}
.blend-rim{position:absolute;inset:-2px;border-radius:50%;animation:spin 5s linear infinite;opacity:0.55}
.blend-glass{position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,210,80,0.62) 0%,rgba(255,140,0,0.32) 30%,rgba(180,60,0,0.56) 65%,rgba(55,15,0,0.88) 100%);backdrop-filter:blur(16px);border:1px solid rgba(255,160,40,0.45);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;box-shadow:inset 0 -8px 24px rgba(0,0,0,0.5),inset 0 4px 12px rgba(255,200,80,0.12)}
.blend-shine{position:absolute;inset:0;border-radius:50%;pointer-events:none;background:radial-gradient(circle at 28% 22%,rgba(255,255,255,0.65) 0%,rgba(255,255,255,0.18) 20%,transparent 55%)}
.bname{font-family:'Orbitron',sans-serif;font-size:clamp(11px,1.7vw,15px);font-weight:900;letter-spacing:3px;color:#fff;position:relative;z-index:2;text-shadow:0 0 12px rgba(255,210,80,0.9),0 0 24px #FF8C00}
.bsub{font-size:clamp(6px,0.85vw,8px);letter-spacing:2px;text-transform:uppercase;color:rgba(255,220,120,0.7);position:relative;z-index:2}
.bdot{position:absolute;top:8px;right:10px;width:6px;height:6px;border-radius:50%;z-index:4}
.blend-label{font-size:8px;letter-spacing:3px;color:rgba(255,140,0,0.4);text-transform:uppercase;margin-top:4px}
#input-bar{position:relative;z-index:10;display:flex;align-items:center;padding:0 16px;height:60px;flex-shrink:0}
#input-inner{display:flex;gap:10px;align-items:center;width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:50px;padding:8px 16px;backdrop-filter:blur(20px)}
#question{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:'Inter',sans-serif;font-size:13px}
#question::placeholder{color:rgba(255,255,255,0.2)}
#ask-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;background:radial-gradient(circle at 35% 30%,#FFA030,#CC5500);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(255,140,0,0.4);flex-shrink:0;transition:opacity 0.2s}
#ask-btn:disabled{opacity:0.3;cursor:not-allowed}
#synth-overlay{display:none;position:absolute;inset:0;z-index:20;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);backdrop-filter:blur(20px);padding:28px 20px}
#synth-overlay.show{display:flex}
#synth-panel{max-width:620px;width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,140,0,0.3);border-radius:18px;padding:24px;box-shadow:0 0 40px rgba(255,140,0,0.08);max-height:80vh;overflow-y:auto}
#synth-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
#synth-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:600;letter-spacing:4px;color:rgba(255,140,0,0.8);text-transform:uppercase}
#synth-close{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:11px}
#synth-text{font-size:13px;line-height:1.85;color:rgba(255,255,255,0.85);white-space:pre-wrap}
#synth-loading{display:none;align-items:center;gap:8px;color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:2px;margin-bottom:12px}
#synth-loading.show{display:flex}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:rgba(255,140,0,0.7);margin:0 2px;animation:dp 1.4s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{transform:scale(0.5);opacity:0.3}40%{transform:scale(1);opacity:1}}
</style>
</head>

<canvas id="stars"></canvas>
<canvas id="lightning"></canvas>

<!-- OPEN-ENDED HEX CORNERS — all 4 -->

<svg class="hc tl" width="140" height="140" viewBox="0 0 140 140">
  <polyline points="0,38 15,28 30,38" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.9"/>

  <polyline points="15,87 30,97 45,87 45,65 30,55" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.9"/>
  <polyline points="30,38 45,28 45,8 30,0" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.9"/>

  <polyline points="0,65 15,55 30,65 30,85" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.9"/>
  <polyline points="15,87 30,97 45,87 45,65 30,55" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.9"/>
  <polyline points="30,38 45,28 45,8 30,0" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.9"/>

  <polyline points="0,65 15,55 30,65 30,85" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.9"/>
  <polyline points="15,87 30,97 45,87 45,65 30,55" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.9"/>
  <polyline points="30,38 45,28 45,8 30,0" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.9"/>

<div id="header">
  <div id="logo">HIVE</div>

<div id="pods">

<script>
// ── BACKEND URL ─────────────────────────────────────────────
const BACKEND = "https://backend-hub.replit.app/api/ask

// ── AI PODS ──────────────────────────────────────────────────
const AI_PODS = [
  {id:"grok",   name:"Grok",   co:"xAI",       color:"#ECEEF2", white:true,  link:"https://x.ai/grok"},
  {id:"gemini", name:"Gemini", co:"Google",     color:"#5B6CF0", white:false, link:"https://gemini.google.com"},
  {id:"sonar",  name:"Sonar",  co:"Perplexity", color:"#00C9C0", white:false, link:"https://perplexity.ai"},
  {id:"claude", name:"Claude", co:"Anthropic",  color:"#FF7A00", white:false, link:"https://claude.ai"},
];

const PS = "clamp(85px,13vw,112px)";
const BS = "clamp(98px,15vw,129px)";

// ── STATE ────────────────────────────────────────────────────
const state = {
  settings: {
    grok:   {active:true, attitude:75},
    gemini: {active:true, attitude:50},
    sonar:  {active:true, attitude:60},
    claude: {active:true, attitude:50},
  },
  responses: {},
  phase: "idle",
};

// ── BUILD AI POD ─────────────────────────────────────────────
function buildPod(pod) {
  const s = state.settings[pod.id];
  const bg = pod.white
    ? "radial-gradient(circle at 30% 25%,rgba(255,255,255,0.94) 0%,rgba(215,220,230,0.74) 35%,rgba(130,135,150,0.5) 65%,rgba(50,55,70,0.78) 100%)"
    : "radial-gradient(circle at 30% 25%,rgba(255,255,255,0.18) 0%,"+pod.color+"25 35%,rgba(0,0,0,0.55) 65%,rgba(0,0,0,0.9) 100%)";
  document.getElementById("wrap-"+pod.id).innerHTML =
    '<div id="sphere-'+pod.id+'" class="sphere" style="width:'+PS+';height:'+PS+';filter:drop-shadow(0 0 10px '+pod.color+') drop-shadow(0 6px 16px rgba(0,0,0,0.65))">' +
      '<div class="rim" style="background:conic-gradient(from 0deg,transparent 0%,'+pod.color+' 25%,transparent 50%,'+pod.color+' 75%,transparent 100%);opacity:0.3"></div>' +
      '<div class="glass" style="background:'+bg+'">' +
        '<div class="shine"></div>' +
        '<div class="pname" style="color:'+(pod.white?'#111':'#fff')+'">'+pod.name+'</div>' +
        '<div class="pco">'+pod.co+'</div>' +
        '<div id="resp-'+pod.id+'" class="presp" style="opacity:0.2">standing by</div>' +
        '<div id="dot-'+pod.id+'" class="pdot" style="background:'+pod.color+';box-shadow:0 0 5px '+pod.color+'"></div>' +
        '<a href="'+pod.link+'" target="_blank" class="dlink">↗</a>' +
      '</div>' +
    '</div>' +
    '<div class="ctl">' +
      '<button id="tog-'+pod.id+'" class="tog on" onclick="togglePod(\''+pod.id+'\')"><div id="togdot-'+pod.id+'" class="togdot" style="left:12px"></div></button>' +
      '<div id="dial-'+pod.id+'" class="dial" style="box-shadow:0 2px 8px rgba(0,0,0,0.6),0 0 5px '+pod.color+'44"><div id="dval-'+pod.id+'" class="dval" style="text-shadow:0 0 5px rgba(255,255,255,0.9),0 0 10px '+pod.color+'">'+s.attitude+'</div></div>' +
      '<button onclick="showHistory(\''+pod.id+'\')" style="width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.35);font-size:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">☰</button>' +
    '</div>';
  setupDial(pod.id);
}

// ── BUILD BLEND POD ──────────────────────────────────────────
function buildBlend() {
  document.getElementById("wrap-blend").innerHTML =
    '<div class="blend-wrap">' +
      '<div id="sphere-blend" class="blend-sphere" onclick="blendTap()" style="width:'+BS+';height:'+BS+'">' +
        '<div class="blend-rim" style="background:conic-gradient(from 0deg,transparent 0%,#FF8C00 25%,transparent 50%,#FFC040 75%,transparent 100%)"></div>' +
        '<div class="blend-glass">' +
          '<div class="blend-shine"></div>' +
          '<div class="bname">BLEND</div>' +
          '<div id="bsub" class="bsub">tap to blend</div>' +
          '<div id="bdot" class="bdot" style="background:#FF8C00;box-shadow:0 0 6px #FF8C00"></div>' +
          '<a href="https://claude.ai" target="_blank" class="dlink" style="bottom:6px;right:7px;width:13px;height:13px;font-size:7px;color:rgba(255,220,120,0.4)">↗</a>' +
        '</div>' +
      '</div>' +
      '<div id="blend-label" class="blend-label">synthesis engine</div>' +
    '</div>';
}

// ── TOGGLE ────────────────────────────────────────────────────
function togglePod(id) {
  state.settings[id].active = !state.settings[id].active;
  const on = state.settings[id].active;
  const pod = AI_PODS.find(p=>p.id===id);
  const sphere = document.getElementById("sphere-"+id);
  document.getElementById("tog-"+id).className = "tog "+(on?"on":"off");
  document.getElementById("togdot-"+id).style.left = (on?12:2)+"px";
  if(on){sphere.classList.remove("off");sphere.style.filter="drop-shadow(0 0 10px "+pod.color+") drop-shadow(0 6px 16px rgba(0,0,0,0.65))";}
  else{sphere.classList.add("off");}
}

// ── DIAL ──────────────────────────────────────────────────────
function setupDial(id) {
  const dial = document.getElementById("dial-"+id);
  let active=false,sy=0,sv=0;
  dial.addEventListener("mousedown",function(e){active=true;sy=e.clientY;sv=state.settings[id].attitude;e.preventDefault();});
  dial.addEventListener("touchstart",function(e){active=true;sy=e.touches[0].clientY;sv=state.settings[id].attitude;e.preventDefault();},{passive:false});
  window.addEventListener("mousemove",function(e){if(!active)return;const v=Math.min(100,Math.max(0,Math.round(sv+(sy-e.clientY))));state.settings[id].attitude=v;document.getElementById("dval-"+id).textContent=v;});
  window.addEventListener("touchmove",function(e){if(!active)return;const v=Math.min(100,Math.max(0,Math.round(sv+(sy-e.touches[0].clientY))));state.settings[id].attitude=v;document.getElementById("dval-"+id).textContent=v;},{passive:false});
  window.addEventListener("mouseup",function(){active=false;});
  window.addEventListener("touchend",function(){active=false;});
}

// ── UPDATE RESPONSE ───────────────────────────────────────────
function updateResp(id, text, loading) {
  const el = document.getElementById("resp-"+id);
  const dot = document.getElementById("dot-"+id);
  const pod = AI_PODS.find(p=>p.id===id);
  if(loading){
    el.className="presp pulse";el.textContent="receiving...";el.style.opacity=1;
    dot.style.background="#FFD700";dot.style.boxShadow="0 0 5px #FFD700";
  } else if(text){
    el.className="presp";el.textContent=text.substring(0,60)+(text.length>60?"...":"");el.style.opacity=1;
    dot.style.background="#00FF55";dot.style.boxShadow="0 0 5px #00FF55";  } else {
    el.className="presp";el.textContent="standing by";el.style.opacity=0.2;
    dot.style.background=pod.color;dot.style.boxShadow="0 0 5px "+pod.color;
  }
}

// ── LIGHTNING ─────────────────────────────────────────────────
function fireZap(id) {
  const canvas=document.getElementById("lightning");
  const podEl=document.getElementById("sphere-"+id);
  const blendEl=document.getElementById("sphere-blend");
  if(!podEl||!blendEl)return;
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pR=podEl.getBoundingClientRect(),bR=blendEl.getBoundingClientRect();
  const px=pR.left+pR.width/2,py=pR.top+pR.height/2;
  const bx=bR.left+bR.width/2,by=bR.top+bR.height/2;
  const pod=AI_PODS.find(p=>p.id===id);
  const col=pod?pod.color:"#fff";
  function mkB(x1,y1,x2,y2){
    const pts=[{x:x1,y:y1}];
    for(let i=1;i<10;i++){const t=i/10,mx=x1+(x2-x1)*t,my=y1+(y2-y1)*t,p=Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1))*0.15;pts.push({x:mx+(Math.random()-.5)*p,y:my+(Math.random()-.5)*p});}
    return pts.concat([{x:x2,y:y2}]);
  }
  const bolts=[{pts:mkB(px,py,bx,by),main:true},{pts:mkB(px,py,bx+(Math.random()-.5)*35,by+(Math.random()-.5)*35),main:false}];
  let frame=0;const ctx=canvas.getContext("2d");
  function anim(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const t=frame/26,a=t<.3?t/.3:t>.7?(1-t)/.3:1;
    bolts.forEach(function(b){
      const j=b.pts.map(function(p,i){if(!i||i===b.pts.length-1)return p;return{x:p.x+(Math.random()-.5)*(b.main?8:4),y:p.y+(Math.random()-.5)*(b.main?8:4)};});
      ctx.save();ctx.globalAlpha=a*(b.main?.95:.4);ctx.strokeStyle=col;ctx.lineWidth=b.main?2.5:1;
      ctx.shadowColor=col;ctx.shadowBlur=16;ctx.lineCap="round";ctx.lineJoin="round";
      ctx.beginPath();ctx.moveTo(j[0].x,j[0].y);j.slice(1).forEach(function(p){ctx.lineTo(p.x,p.y);});ctx.stroke();ctx.restore();
    });
    frame++;
    if(frame<26)requestAnimationFrame(anim);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  requestAnimationFrame(anim);
}

// ── MARKDOWN RENDERER ────────────────────────────────────────
function renderMarkdown(text) {
  return text
    .replace(/^### (.+)$/gm,'<h3 style="font-size:14px;font-weight:700;color:#fff;margin:12px 0 4px">$1</h3>')
    .replace(/^## (.+)$/gm,'<h2 style="font-size:16px;font-weight:700;color:#fff;margin:14px 0 6px">$1</h2>')
    .replace(/^# (.+)$/gm,'<h1 style="font-size:18px;font-weight:900;color:#fff;margin:16px 0 8px">$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^---+$/gm,'<hr style="border:none;border-top:1px solid rgba(255,140,0,0.2);margin:12px 0">')
    .replace(/^- (.+)$/gm,'<div style="padding:2px 0 2px 12px;color:rgba(255,255,255,0.85)">• $1</div>')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

// ── CHAT HISTORY ─────────────────────────────────────────────
const chatHistory = {grok:[],gemini:[],sonar:[],claude:[],blend:[]};

function saveToHistory(podId, question, answer) {
  chatHistory[podId].push({
    q: question,
    a: answer,
    time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
  });
}

function showHistory(podId) {
  const pod = AI_PODS.find(function(p){return p.id===podId;}) || {name:"BLEND",color:"#FF8C00"};
  const history = chatHistory[podId];
  const panel = document.getElementById("synth-panel");
  const title = document.getElementById("synth-title");
  const text = document.getElementById("synth-text");
  title.textContent = pod.name.toUpperCase() + " HISTORY";
  if(!history.length){
    text.innerHTML = '<span style="color:rgba(255,255,255,0.3)">No history yet.</span>';
  } else {
    text.innerHTML = history.slice().reverse().map(function(h){
      return '<div style="margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:12px">' +
        '<div style="font-size:10px;color:rgba(255,140,0,0.5);letter-spacing:2px;margin-bottom:4px">'+h.time+'</div>' +
        '<div style="color:rgba(255,255,255,0.5);font-size:11px;margin-bottom:6px">Q: '+h.q+'</div>' +
        '<div style="color:rgba(255,255,255,0.85);font-size:12px;line-height:1.6">'+h.a.substring(0,200)+(h.a.length>200?"...":"")+'</div>' +
      '</div>';
    }).join("");
  }
  document.getElementById("synth-overlay").classList.add("show");
}

// ── VOICE WITH PECKING ORDER ──────────────────────────────────
let recognition = null;
let voiceActive = false;

function initVoice() {
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onresult = function(e) {
    const transcript = e.results[0][0].transcript;
    document.getElementById("question").value = transcript;
    handleAsk();
  };
  recognition.onerror = function() { voiceActive = false; updateMicBtn(); };
  recognition.onend = function() { voiceActive = false; updateMicBtn(); };
}

function toggleVoice() {
  if(!recognition) { alert("Voice not supported on this browser."); return; }
  if(voiceActive) { recognition.stop(); voiceActive=false; }
  else { recognition.start(); voiceActive=true; }
  updateMicBtn();
}

function updateMicBtn() {
  const btn = document.getElementById("mic-btn");
  if(!btn) return;
  btn.style.background = voiceActive
    ? "radial-gradient(circle at 35% 30%,#FF4444,#AA0000)"
    : "radial-gradient(circle at 35% 30%,rgba(255,255,255,0.15),rgba(0,0,0,0.5))";
  btn.style.boxShadow = voiceActive ? "0 0 10px rgba(255,0,0,0.5)" : "none";
}

// ── TTS PECKING ORDER ─────────────────────────────────────────
function speakInOrder(responses) {
  if(!('speechSynthesis' in window)) return;
  const active = AI_PODS.filter(function(p){return state.settings[p.id].active && responses[p.id];});
  let index = 0;
  function speakNext() {
    if(index >= active.length) return;
    const pod = active[index];
    const utt = new SpeechSynthesisUtterance(responses[pod.id].substring(0,300));
    utt.rate = 0.95;
    utt.pitch = 1;
    utt.onend = function() { index++; setTimeout(speakNext, 400); };
    window.speechSynthesis.speak(utt);
    index++;
  }
  speakNext();
}

// ── BLEND TAP ─────────────────────────────────────────────────
function blendTap() {
  if(state.phase==="results") document.getElementById("synth-overlay").classList.add("show");
  else handleAsk();
}

// ── MAIN ASK ──────────────────────────────────────────────────
async function handleAsk() {
  const q = document.getElementById("question").value.trim();
  if(!q||state.phase==="loading") return;
  if(state.phase==="results"){document.getElementById("synth-overlay").classList.add("show");return;}
  const active = AI_PODS.filter(function(p){return state.settings[p.id].active;});
  if(!active.length) return;

  state.phase="loading";
  state.responses={};
  document.getElementById("ask-btn").disabled=true;
  document.getElementById("bsub").textContent="receiving...";
  active.forEach(function(p){updateResp(p.id,null,true);});

  try {
    const res = await fetch(BACKEND+"/api/ask",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({question:q})
    });
    const data = await res.json();

    // data.answers = [{ai, model, answer}], data.ultimateAnswer = blend
    if(data.answers && Array.isArray(data.answers)) {
      data.answers.forEach(function(item) {
        const name = item.ai.toLowerCase();
        const pid = name==="perplexity"?"sonar":name==="claude"?"claude":name==="grok"?"grok":"gemini";
        state.responses[pid]=item.answer;
        updateResp(pid,item.answer,false);
        setTimeout(function(){fireZap(pid);},Math.random()*400);
      });
    }

    // Show synthesis overlay
    document.getElementById("synth-overlay").classList.add("show");
    document.getElementById("synth-loading").classList.add("show");
    document.getElementById("synth-text").textContent="";
    document.getElementById("bsub").textContent="fusing...";
    document.getElementById("bdot").style.background="#FFD700";
    document.getElementById("bdot").style.boxShadow="0 0 6px #FFD700";

    const synthesis = data.ultimateAnswer || "No synthesis available.";
    document.getElementById("synth-loading").classList.remove("show");
    document.getElementById("synth-text").innerHTML = renderMarkdown(synthesis);
    document.getElementById("bsub").textContent="ready — tap to view";
    document.getElementById("bdot").style.background="#00FF55";
    document.getElementById("bdot").style.boxShadow="0 0 6px #00FF55";
    document.getElementById("blend-label").textContent="synthesis ready";

    // Save to history
    if(data.answers && Array.isArray(data.answers)) {
      data.answers.forEach(function(item) {
        const name = item.ai.toLowerCase();
        const pid = name==="perplexity"?"sonar":name==="claude"?"claude":name==="grok"?"grok":"gemini";
        saveToHistory(pid, q, item.answer);
      });
    }
    saveToHistory("blend", q, synthesis);

    // Speak in pecking order
    speakInOrder(state.responses);

  } catch(e) {
    document.getElementById("synth-loading").classList.remove("show");
    document.getElementById("synth-text").textContent="Backend unavailable. Check Replit.";
    document.getElementById("synth-overlay").classList.add("show");
  }

  state.phase="results";
  document.getElementById("ask-btn").disabled=false;
}

// ── RESET ─────────────────────────────────────────────────────
function reset() {
  document.getElementById("synth-overlay").classList.remove("show");
  document.getElementById("question").value="";
  state.phase="idle";
  AI_PODS.forEach(function(p){updateResp(p.id,null,false);});
  document.getElementById("bsub").textContent="tap to blend";
  document.getElementById("blend-label").textContent="synthesis engine";
  document.getElementById("bdot").style.background="#FF8C00";
  document.getElementById("bdot").style.boxShadow="0 0 6px #FF8C00";
}

document.getElementById("synth-close").addEventListener("click",reset);
document.getElementById("question").addEventListener("keydown",function(e){if(e.key==="Enter")handleAsk();});
document.getElementById("ask-btn").addEventListener("click",handleAsk);

// ── STARS ─────────────────────────────────────────────────────
(function(){
  const c=document.getElementById("stars"),ctx=c.getContext("2d");
  function rs(){c.width=window.innerWidth;c.height=window.innerHeight;}rs();
  const stars=[];
  for(let i=0;i<160;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*0.9+0.2,a:Math.random()*0.4+0.1,sp:Math.random()*0.005+0.002,ph:Math.random()*Math.PI*2});
  function draw(t){ctx.fillStyle="#000";ctx.fillRect(0,0,c.width,c.height);stars.forEach(function(s){const a=s.a*(0.5+0.5*Math.sin(t*s.sp+s.ph));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,"+a+")";ctx.fill();});requestAnimationFrame(draw);}
  requestAnimationFrame(draw);
  window.addEventListener("resize",rs);
})();

// ── INIT ──────────────────────────────────────────────────────
AI_PODS.forEach(buildPod);
buildBlend();
initVoice();
</script>
