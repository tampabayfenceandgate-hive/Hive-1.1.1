<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIVE — Your Swarm. Your Rules.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;background:#000;overflow:hidden}
  body{font-family:'Inter',sans-serif;color:#fff;display:flex;flex-direction:column}
  canvas{position:absolute;inset:0;pointer-events:none}
  #stars{z-index:0}
  #lightning{z-index:3}
  .hc{position:absolute;z-index:1;pointer-events:none}
  .hc.tl{top:0;left:0}
  .hc.tr{top:0;right:0;transform:scaleX(-1)}
  .hc.bl{bottom:0;left:0;transform:scaleY(-1)}
  .hc.br{bottom:0;right:0;transform:scale(-1)}
  #header{position:relative;z-index:10;text-align:center;padding:12px 0 4px;flex-shrink:0}
  #logo{font-family:'Orbitron',sans-serif;font-size:clamp(18px,3.5vw,28px);font-weight:900;
    letter-spacing:10px;color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.3),0 0 40px rgba(255,140,0,0.2);
    animation:flk 9s infinite}
  @keyframes flk{0%,94%,100%{opacity:1}95%{opacity:0.65}97%{opacity:1}}
  #tagline{font-size:9px;letter-spacing:4px;color:rgba(255,255,255,0.22);text-transform:uppercase;margin-top:2px}
  #pods{position:relative;z-index:5;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0}
  #pods-inner{display:flex;flex-direction:column;align-items:center;gap:clamp(6px,1.2vh,14px);width:100%;max-width:680px;padding:0 16px}
  .row{display:flex;justify-content:space-around;width:100%;align-items:flex-end}
  .pod-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
  .sphere{border-radius:50%;position:relative;flex-shrink:0;transition:filter 0.3s}
  .sphere.active{animation:flt 4s ease-in-out infinite}
  .sphere.inactive{opacity:0.35}
  .sphere.zapped{animation:zapf 0.4s ease-out !important}
  @keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes zapf{0%{filter:drop-shadow(0 0 40px white) brightness(2)}100%{filter:none}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes ptxt{0%,100%{opacity:0.2}50%{opacity:1}}
  .rim{position:absolute;inset:-2px;border-radius:50%;animation:spin 8s linear infinite;opacity:0.3}
  .glass{position:absolute;inset:3px;border-radius:50%;backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.15);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    box-shadow:inset 0 -6px 20px rgba(0,0,0,0.5),inset 0 3px 10px rgba(255,255,255,0.06)}
  .shine{position:absolute;inset:0;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle at 28% 22%,rgba(255,255,255,0.58) 0%,rgba(255,255,255,0.12) 20%,transparent 55%)}
  .pname{font-family:'Orbitron',sans-serif;font-size:clamp(8px,1.3vw,11px);font-weight:600;
    letter-spacing:1px;position:relative;z-index:2}
  .pco{font-size:clamp(5px,0.8vw,7px);letter-spacing:1px;text-transform:uppercase;
    color:rgba(255,255,255,0.35);position:relative;z-index:2}
  .presp{font-size:clamp(5px,0.75vw,7px);line-height:1.4;color:rgba(255,255,255,0.7);
    text-align:center;padding:0 7px;max-height:28px;overflow:hidden;position:relative;z-index:2}
  .pstatus{position:absolute;top:7px;right:8px;width:5px;height:5px;border-radius:50%;z-index:4}
  .dlink{position:absolute;bottom:5px;right:6px;width:12px;height:12px;border-radius:50%;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
    display:flex;align-items:center;justify-content:center;font-size:6px;
    color:rgba(255,255,255,0.3);text-decoration:none;z-index:4}
  .pulse{animation:ptxt 1.3s infinite}
  .ctl{display:flex;align-items:center;gap:4px}
  .tog{width:22px;height:12px;border-radius:6px;cursor:pointer;position:relative;
    flex-shrink:0;transition:background 0.3s;border:none;outline:none}
  .tog.on{background:rgba(0,255,100,0.5);box-shadow:0 0 5px rgba(0,255,100,0.35)}
  .tog.off{background:rgba(255,255,255,0.12)}
  .tog-dot{position:absolute;top:2px;width:8px;height:8px;border-radius:50%;background:#fff;
    transition:left 0.3s;box-shadow:0 1px 2px rgba(0,0,0,0.4)}
  .dial{width:24px;height:24px;border-radius:50%;cursor:grab;flex-shrink:0;user-select:none;
    background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.22),rgba(0,0,0,0.65));
    border:1px solid rgba(255,255,255,0.22);backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center}
  .dial:active{cursor:grabbing}
  .dval{font-family:'Orbitron',sans-serif;font-size:6px;font-weight:600;pointer-events:none;color:rgba(255,255,255,0.92)}
  .blend-sphere{border-radius:50%;position:relative;flex-shrink:0;cursor:pointer;animation:flt 3.5s ease-in-out infinite}
  .blend-rim{position:absolute;inset:-2px;border-radius:50%;animation:spin 5s linear infinite;opacity:0.55}
  .blend-glass{position:absolute;inset:3px;border-radius:50%;
    background:radial-gradient(circle at 30% 25%,rgba(255,210,80,0.62) 0%,rgba(255,140,0,0.32) 30%,rgba(180,60,0,0.56) 65%,rgba(55,15,0,0.88) 100%);
    backdrop-filter:blur(16px);border:1px solid rgba(255,160,40,0.45);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    box-shadow:inset 0 -8px 24px rgba(0,0,0,0.5),inset 0 4px 12px rgba(255,200,80,0.12)}
  .blend-shine{position:absolute;inset:0;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle at 28% 22%,rgba(255,255,255,0.65) 0%,rgba(255,255,255,0.18) 20%,transparent 55%)}
  .bname{font-family:'Orbitron',sans-serif;font-size:clamp(11px,1.7vw,15px);font-weight:900;
    letter-spacing:3px;color:#fff;position:relative;z-index:2;
    text-shadow:0 0 12px rgba(255,210,80,0.9),0 0 24px #FF8C00}
  .bsub{font-size:clamp(6px,0.85vw,8px);letter-spacing:2px;text-transform:uppercase;
    color:rgba(255,220,120,0.7);position:relative;z-index:2}
  .bstatus{position:absolute;top:8px;right:10px;width:6px;height:6px;border-radius:50%;z-index:4}
  .bdlink{position:absolute;bottom:6px;right:7px;width:13px;height:13px;border-radius:50%;
    background:rgba(255,200,80,0.08);border:1px solid rgba(255,160,40,0.2);
    display:flex;align-items:center;justify-content:center;font-size:7px;
    color:rgba(255,220,120,0.4);text-decoration:none;z-index:4}
  #input-bar{position:relative;z-index:10;display:flex;align-items:center;padding:0 16px;height:60px;flex-shrink:0}
  #input-inner{display:flex;gap:10px;align-items:center;width:100%;
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
    border-radius:50px;padding:8px 16px;backdrop-filter:blur(20px)}
  #question{flex:1;background:transparent;border:none;outline:none;color:#fff;
    font-family:'Inter',sans-serif;font-size:13px}
  #question::placeholder{color:rgba(255,255,255,0.2);font-style:italic}
  #ask-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
    background:radial-gradient(circle at 35% 30%,#FFA030,#CC5500);color:#fff;
    font-size:13px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 10px rgba(255,140,0,0.4);flex-shrink:0;transition:all 0.2s}
  #ask-btn:disabled{opacity:0.3;cursor:not-allowed}
  #synth-overlay{display:none;position:absolute;inset:0;z-index:20;
    align-items:center;justify-content:center;
    background:rgba(0,0,0,0.88);backdrop-filter:blur(20px);padding:28px 20px}
  #synth-overlay.show{display:flex}
  #synth-panel{max-width:620px;width:100%;background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,140,0,0.3);border-radius:18px;padding:24px;
    box-shadow:0 0 40px rgba(255,140,0,0.08);max-height:80vh;overflow-y:auto}
  #synth-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  #synth-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:600;
    letter-spacing:4px;color:rgba(255,140,0,0.8);text-transform:uppercase}
  #synth-close{background:transparent;border:1px solid rgba(255,255,255,0.15);
    color:rgba(255,255,255,0.5);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:11px}
  #synth-text{font-size:13px;line-height:1.85;color:rgba(255,255,255,0.85);white-space:pre-wrap}
  #synth-loading{display:none;align-items:center;gap:10px;color:rgba(255,255,255,0.4);font-size:12px;letter-spacing:2px}
  #synth-loading.show{display:flex}
  .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:rgba(255,140,0,0.7);margin:0 2px;animation:dp 1.4s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes dp{0%,80%,100%{transform:scale(0.5);opacity:0.3}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="lightning"></canvas>

<!-- HEX CORNERS — all 4 -->

<svg class="hc tl" width="140" height="140" viewBox="0 0 140 140">
  <polyline points="0,38 15,28 30,38" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.9"/>
  <polyline points="0,65 15,55 30,65 30,85" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.9"/>
  <polyline points="15,87 30,97 45,87 45,65 30,55" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.9"/>
  <polyline points="30,38 45,28 45,8 30,0" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.9"/>

  <polyline points="0,65 15,55 30,65 30,85" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.9"/>
  <polyline points="15,87 30,97 45,87 45,65 30,55" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.9"/>
  <polyline points="30,38 45,28 45,8 30,0" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.9"/>

  <polyline points="0,38 15,28 30,38" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.9"/>
  <polyline points="0,65 15,55 30,65 30,85" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.9"/>
  <polyline points="15,87 30,97 45,87 45,65 30,55" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.9"/>
  <polyline points="30,38 45,28 45,8 30,0" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.9"/>
  <polyline points="0,8 15,0" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.9"/>
</svg>

<div id="header">
  <div id="logo">HIVE</div>

</div>

<div id="pods">
  <div id="pods-inner">
    <div class="row">
      <div class="pod-wrap" id="wrap-grok"></div>

</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────
// Change this to your backend URL when deployed
// e.g. "https://hive-backend.vercel.app"
// Leave as "" to use same server (if frontend + backend are together)
const BACKEND = "https://2d4cea0c-7f73-474f-a731-231c1c22b7c9-00-1jy6cj14vbpmp.spock.replit.dev

const AI_PODS = [
  {id:"grok",   name:"Grok",   co:"xAI",        color:"#ECEEF2", white:true,  link:"https://x.ai/grok"},
  {id:"gemini", name:"Gemini", co:"Google",      color:"#5B6CF0", white:false, link:"https://gemini.google.com"},
  {id:"sonar",  name:"Sonar",  co:"Perplexity",  color:"#00C9C0", white:false, link:"https://perplexity.ai"},
  {id:"claude", name:"Claude", co:"Anthropic",   color:"#FF7A00", white:false, link:"https://claude.ai"},
];

const state = {
  settings: {
    grok:   {active:true, attitude:75},
    gemini: {active:true, attitude:50},
    sonar:  {active:true, attitude:60},
    claude: {active:true, attitude:50},
  },
  responses: {},
  phase: "idle",
};

const PS = "clamp(85px,13vw,112px)";
const BS = "clamp(98px,15vw,129px)";

// ── BUILD PODS ──────────────────────────────────────────────
function buildPod(pod) {
  const s = state.settings[pod.id];
  const bg = pod.white
    ? "radial-gradient(circle at 30% 25%,rgba(255,255,255,0.94) 0%,rgba(215,220,230,0.74) 35%,rgba(130,135,150,0.5) 65%,rgba(50,55,70,0.78) 100%)"
    : `radial-gradient(circle at 30% 25%,rgba(255,255,255,0.18) 0%,${pod.color}25 35%,rgba(0,0,0,0.55) 65%,rgba(0,0,0,0.9) 100%)`;
  document.getElementById("wrap-"+pod.id).innerHTML = `
    <div id="sphere-${pod.id}" class="sphere active"
      style="width:${PS};height:${PS};filter:drop-shadow(0 0 10px ${pod.color}) drop-shadow(0 6px 16px rgba(0,0,0,0.65))">
      <div class="rim" style="background:conic-gradient(from 0deg,transparent 0%,${pod.color} 25%,transparent 50%,${pod.color} 75%,transparent 100%)"></div>
      <div class="glass" style="background:${bg}">
        <div class="shine"></div>
        <div class="pname" style="color:${pod.white?'#111':'#fff'}">${pod.name}</div>
        <div class="pco">${pod.co}</div>
        <div id="resp-${pod.id}" class="presp" style="opacity:0.2">standing by</div>
        <div id="dot-${pod.id}" class="pstatus" style="background:${pod.color};box-shadow:0 0 5px ${pod.color}"></div>
        <a href="${pod.link}" target="_blank" class="dlink">↗</a>
      </div>
    </div>
    <div class="ctl">
      <button id="tog-${pod.id}" class="tog on" onclick="togglePod('${pod.id}')">
        <div id="togdot-${pod.id}" class="tog-dot" style="left:12px"></div>
      </button>
      <div id="dial-${pod.id}" class="dial" style="box-shadow:0 2px 8px rgba(0,0,0,0.6),0 0 5px ${pod.color}44">
        <div id="dval-${pod.id}" class="dval" style="text-shadow:0 0 5px rgba(255,255,255,0.9),0 0 10px ${pod.color}">${s.attitude}</div>
      </div>
    </div>`;
  setupDial(pod.id);
}

function buildBlend() {
  document.getElementById("wrap-blend").innerHTML = `
    <div id="sphere-blend" class="blend-sphere" onclick="blendTap()"
      style="width:${BS};height:${BS};filter:drop-shadow(0 0 18px #FF8C00) drop-shadow(0 0 36px rgba(255,140,0,0.4)) drop-shadow(0 10px 24px rgba(0,0,0,0.7))">
      <div class="blend-rim" style="background:conic-gradient(from 0deg,transparent 0%,#FF8C00 25%,transparent 50%,#FFC040 75%,transparent 100%)"></div>
      <div class="blend-glass">
        <div class="blend-shine"></div>
        <div class="bname">BLEND</div>
        <div id="bsub" class="bsub">tap to blend</div>
        <div id="bdot" class="bstatus" style="background:#FF8C00;box-shadow:0 0 6px #FF8C00"></div>
        <a href="https://claude.ai" target="_blank" class="bdlink">↗</a>
      </div>
    </div>
    <div style="font-size:8px;letter-spacing:3px;color:rgba(255,140,0,0.4);text-transform:uppercase;margin-top:4px" id="blend-label">synthesis engine</div>`;
}

function blendTap() {
  if(state.phase === "results") {
    document.getElementById("synth-overlay").classList.add("show");
  } else {
    handleAsk();
  }
}

// ── TOGGLE ──────────────────────────────────────────────────
function togglePod(id) {
  state.settings[id].active = !state.settings[id].active;
  const on = state.settings[id].active;
  document.getElementById("tog-"+id).className = "tog "+(on?"on":"off");
  document.getElementById("togdot-"+id).style.left = (on?12:2)+"px";
  const sphere = document.getElementById("sphere-"+id);
  const pod = AI_PODS.find(p=>p.id===id);
  sphere.className = "sphere "+(on?"active":"inactive");
  sphere.style.filter = on ? `drop-shadow(0 0 10px ${pod.color}) drop-shadow(0 6px 16px rgba(0,0,0,0.65))` : "none";
  sphere.style.opacity = on ? 1 : 0.35;
}

// ── DIAL ────────────────────────────────────────────────────
function setupDial(id) {
  const dial = document.getElementById("dial-"+id);
  let active=false, startY=0, startVal=0;
  dial.addEventListener("mousedown",e=>{active=true;startY=e.clientY;startVal=state.settings[id].attitude;e.preventDefault();});
  dial.addEventListener("touchstart",e=>{active=true;startY=e.touches[0].clientY;startVal=state.settings[id].attitude;e.preventDefault();},{passive:false});
  window.addEventListener("mousemove",e=>{
    if(!active)return;
    const v=Math.min(100,Math.max(0,Math.round(startVal+(startY-e.clientY))));
    state.settings[id].attitude=v;
    document.getElementById("dval-"+id).textContent=v;
    fireZap(id);
  });
  window.addEventListener("touchmove",e=>{
    if(!active)return;
    const v=Math.min(100,Math.max(0,Math.round(startVal+(startY-e.touches[0].clientY))));
    state.settings[id].attitude=v;
    document.getElementById("dval-"+id).textContent=v;
  },{passive:false});
  window.addEventListener("mouseup",()=>active=false);
  window.addEventListener("touchend",()=>active=false);
}

// ── UPDATE RESPONSE ─────────────────────────────────────────
function updateResp(id, text, loading) {
  const el = document.getElementById("resp-"+id);
  const dot = document.getElementById("dot-"+id);
  const pod = AI_PODS.find(p=>p.id===id);
  if(loading){
    el.className="presp pulse";el.textContent="receiving...";el.style.opacity=1;
    dot.style.background="#FFD700";dot.style.boxShadow="0 0 5px #FFD700";
  } else if(text){
    el.className="presp";el.textContent=text.substring(0,60)+(text.length>60?"...":"");el.style.opacity=1;
    dot.style.background="#00FF55";dot.style.boxShadow="0 0 5px #00FF55";
  } else {
    el.className="presp";el.textContent="standing by";el.style.opacity=0.2;
    dot.style.background=pod.color;dot.style.boxShadow="0 0 5px "+pod.color;
  }
}

// ── LIGHTNING ────────────────────────────────────────────────
function fireZap(id) {
  const canvas=document.getElementById("lightning");
  const podEl=document.getElementById("sphere-"+id);
  const blendEl=document.getElementById("sphere-blend");
  if(!podEl||!blendEl)return;
  const pR=podEl.getBoundingClientRect(),bR=blendEl.getBoundingClientRect();
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const px=pR.left+pR.width/2,py=pR.top+pR.height/2;
  const bx=bR.left+bR.width/2,by=bR.top+bR.height/2;
  const pod=AI_PODS.find(p=>p.id===id);
  const col=pod?pod.color:"#fff";
  function mkBolt(x1,y1,x2,y2){
    const pts=[{x:x1,y:y1}];
    for(let i=1;i<10;i++){const t=i/10,mx=x1+(x2-x1)*t,my=y1+(y2-y1)*t,p=Math.sqrt((x2-x1)**2+(y2-y1)**2)*0.15;pts.push({x:mx+(Math.random()-.5)*p,y:my+(Math.random()-.5)*p});}
    return[...pts,{x:x2,y:y2}];
  }
  const bolts=[{pts:mkBolt(px,py,bx,by),main:true},{pts:mkBolt(px,py,bx+(Math.random()-.5)*35,by+(Math.random()-.5)*35),main:false}];
  document.getElementById("sphere-"+id).classList.add("zapped");
  setTimeout(()=>document.getElementById("sphere-"+id).classList.remove("zapped"),400);
  let frame=0;const total=26;const ctx=canvas.getContext("2d");
  function anim(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const t=frame/total,a=t<.3?t/.3:t>.7?(1-t)/.3:1;
    bolts.forEach(b=>{
      const j=b.pts.map((p,i)=>{if(!i||i===b.pts.length-1)return p;return{x:p.x+(Math.random()-.5)*(b.main?8:4),y:p.y+(Math.random()-.5)*(b.main?8:4)};});
      ctx.save();ctx.globalAlpha=a*(b.main?.95:.4);ctx.strokeStyle=col;ctx.lineWidth=b.main?2.5:1;
      ctx.shadowColor=col;ctx.shadowBlur=16;ctx.lineCap="round";ctx.lineJoin="round";
      ctx.beginPath();ctx.moveTo(j[0].x,j[0].y);j.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();ctx.restore();
      if(b.main){ctx.save();ctx.globalAlpha=a*.5;ctx.strokeStyle="rgba(255,255,255,0.75)";ctx.lineWidth=.8;ctx.shadowBlur=0;ctx.beginPath();ctx.moveTo(j[0].x,j[0].y);j.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();ctx.restore();}
    });
    frame++;
    if(frame<total)requestAnimationFrame(anim);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  requestAnimationFrame(anim);
}

// ── MOCK RESPONSES (used when backend unavailable) ──────────
const MOCKS = {
  grok: [
    "Honestly? Most people overthink this. Here's the straight answer — it's simpler than it looks once you stop second-guessing yourself.",
    "I'll be real with you — there are two ways to look at this and most people only see one. Both matter depending on where you're standing.",
    "Look, nobody wants to say this out loud but the answer is pretty obvious once you actually sit with it for a second.",
  ],
  gemini: [
    "Good question. There are a few different angles worth thinking about. The short version is this really depends on your situation, but here's what tends to work.",
    "So the thing is, this comes up a lot and the answer isn't one-size-fits-all. That said, there's a pretty clear pattern that tends to hold true.",
    "This is one of those questions where context matters a lot. But if I had to give you the most useful answer possible, I'd start here.",
  ],
  sonar: [
    "Based on what's out there right now, the consensus is leaning pretty clearly in one direction. Here's what the latest info actually says.",
    "Real-time look at this — things have shifted recently. Here's where it stands today and why it matters for your question.",
    "Current sources confirm this is more straightforward than it looks. Here's what the data actually shows.",
  ],
  claude: [
    "Here's my honest take — the question has layers but the core answer is actually straightforward once you strip away the noise.",
    "The way I see it, there are a few things worth considering here that most people skip over. Let me break it down.",
    "This is a great question and the answer depends on a few key factors. Here's how I'd think about it.",
  ],
};
function getRand(arr){return arr[Math.floor(Math.random()*arr.length)];}

// ── API CALLS → BACKEND ─────────────────────────────────────
async function callAI(endpoint, question, attitude) {
  try {
    const res = await fetch(BACKEND + "/api/ask", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({question, attitude})
    });
    const data = await res.json();
    // Leo's endpoint returns { answers: {grok, gemini, sonar, claude}, blend }
    if(data.answers && data.answers[endpoint]) return data.answers[endpoint];
    return getRand(MOCKS[endpoint]||MOCKS.claude);
  } catch(e) {
    await new Promise(r=>setTimeout(r, 800+Math.random()*700));
    return getRand(MOCKS[endpoint]||MOCKS.claude);
  }
}

async function callBlend(question, responses) {
  try {
    const res = await fetch(BACKEND + "/api/ask", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({question})
    });
    const data = await res.json();
    if(data.blend) return data.blend;
    return buildFallbackBlend(responses);
  } catch(e) {
    return buildFallbackBlend(responses);
  }
}

function buildFallbackBlend(responses) {
  return Object.entries(responses)
    .filter(([,v])=>v&&v.length>5)
    .map(([name,text])=>"▸ "+name.charAt(0).toUpperCase()+name.slice(1)+"\n"+text)
    .join("\n\n──────────\n\n");
}

// ── MAIN ASK ─────────────────────────────────────────────────
async function handleAsk() {
  const q = document.getElementById("question").value.trim();
  if(!q || state.phase==="loading") return;
  if(state.phase==="results"){
    document.getElementById("synth-overlay").classList.add("show");
    return;
  }
  const active = AI_PODS.filter(p=>state.settings[p.id].active);
  if(!active.length) return;

  state.phase = "loading";
  state.responses = {};
  document.getElementById("ask-btn").disabled = true;
  document.getElementById("bsub").textContent = "receiving...";
  active.forEach(p=>updateResp(p.id, null, true));

  try {
    const res = await fetch(BACKEND + "/api/ask", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({question: q})
    });
    const data = await res.json();

    // Match Replit format: data.answers = [{ai, model, answer}]
    if(data.answers && Array.isArray(data.answers)) {
      data.answers.forEach(item => {
        const aiName = item.ai.toLowerCase().replace("perplexity","sonar");
        const pod = AI_PODS.find(p=>p.id===aiName||p.name.toLowerCase()===item.ai.toLowerCase());
        if(pod) {
          state.responses[pod.id] = item.answer;
          updateResp(pod.id, item.answer, false);
          setTimeout(()=>fireZap(pod.id), Math.random()*400);
        }
      });
    }

    // Show synthesis
    document.getElementById("synth-overlay").classList.add("show");
    document.getElementById("synth-loading").classList.add("show");
    document.getElementById("synth-text").textContent = "";
    document.getElementById("bsub").textContent = "fusing...";
    document.getElementById("bdot").style.background = "#FFD700";
    document.getElementById("bdot").style.boxShadow = "0 0 6px #FFD700";

    // data.ultimateAnswer is Claude's blend
    const synthesis = data.ultimateAnswer || buildFallbackBlend(state.responses);
    document.getElementById("synth-loading").classList.remove("show");
    document.getElementById("synth-text").textContent = synthesis;
    document.getElementById("bsub").textContent = "ready — tap to view";
    document.getElementById("bdot").style.background = "#00FF55";
    document.getElementById("bdot").style.boxShadow = "0 0 6px #00FF55";
    document.getElementById("blend-label").textContent = "synthesis ready";

  } catch(e) {
    // Fallback to mocks
    for(const pod of active) {
      await new Promise(r=>setTimeout(r, 700+Math.random()*600));
      const answer = getRand(MOCKS[pod.id]||MOCKS.claude);
      state.responses[pod.id] = answer;
      updateResp(pod.id, answer, false);
      fireZap(pod.id);
    }
    document.getElementById("synth-overlay").classList.add("show");
    document.getElementById("synth-text").textContent = buildFallbackBlend(state.responses);
    document.getElementById("bsub").textContent = "ready — tap to view";
  }

  state.phase = "results";
  document.getElementById("ask-btn").disabled = false;
}

// ── CLOSE SYNTH ──────────────────────────────────────────────
document.getElementById("synth-close").addEventListener("click", () => {
  document.getElementById("synth-overlay").classList.remove("show");
  document.getElementById("question").value = "";
  state.phase = "idle";
  AI_PODS.forEach(p=>updateResp(p.id,null,false));
  document.getElementById("bsub").textContent = "tap to blend";
  document.getElementById("blend-label").textContent = "synthesis engine";
  document.getElementById("bdot").style.background = "#FF8C00";
  document.getElementById("bdot").style.boxShadow = "0 0 6px #FF8C00";
});

document.getElementById("question").addEventListener("keydown", e=>{if(e.key==="Enter")handleAsk();});
document.getElementById("ask-btn").addEventListener("click", handleAsk);

// ── STARS ────────────────────────────────────────────────────
(function(){
  const c=document.getElementById("stars"),ctx=c.getContext("2d");
  function rs(){c.width=window.innerWidth;c.height=window.innerHeight;}rs();
  const stars=Array.from({length:160},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*0.9+0.2,a:Math.random()*0.4+0.1,sp:Math.random()*0.005+0.002,ph:Math.random()*Math.PI*2}));
  function draw(t){ctx.fillStyle="#000";ctx.fillRect(0,0,c.width,c.height);stars.forEach(s=>{const a=s.a*(0.5+0.5*Math.sin(t*s.sp+s.ph));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();});requestAnimationFrame(draw);}
  requestAnimationFrame(draw);window.addEventListener("resize",rs);
})();

AI_PODS.forEach(buildPod);
buildBlend();
