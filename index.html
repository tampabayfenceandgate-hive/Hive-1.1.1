<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; color: #fff; }
        .app { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; }
        .header { text-align: center; padding: 20px 0; z-index: 10; }
        .logo { font-size: 32px; font-weight: 900; letter-spacing: 8px; }
        .tagline { font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.3); margin-top: 4px; }
        .pods-area { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
        .pods-container { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 700px; }
        .row { display: flex; justify-content: space-around; width: 100%; }
        .pod { width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.2), rgba(0,0,0,0.8)); border: 1px solid rgba(255,255,255,0.15); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 0 20px rgba(255,255,255,0.1); position: relative; cursor: pointer; }
        .pod.grok { box-shadow: 0 0 20px rgba(240,242,245,0.4); }
        .pod.gemini { box-shadow: 0 0 20px rgba(91,108,240,0.4); }
        .pod.sonar { box-shadow: 0 0 20px rgba(0,201,192,0.4); }
        .pod.claude { box-shadow: 0 0 20px rgba(255,140,0,0.4); }
        .pod-name { font-size: 14px; font-weight: 600; letter-spacing: 2px; }
        .pod-company { font-size: 9px; letter-spacing: 1px; opacity: 0.6; }
        .blend-pod { width: 160px; height: 160px; background: radial-gradient(circle at 30% 25%, rgba(255,180,80,0.3), rgba(180,60,0,0.8)); box-shadow: 0 0 30px rgba(255,140,0,0.5); }
        .blend-pod .pod-name { font-size: 16px; letter-spacing: 3px; }
        .input-bar { padding: 12px 20px 20px; z-index: 10; flex-shrink: 0; }
        .input-inner { display: flex; gap: 12px; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 10px 20px; }
        input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 14px; }
        input::placeholder { color: rgba(255,255,255,0.2); }
        button { background: radial-gradient(circle at 35% 30%, #FF7A2A, #CC4A00); border: none; color: #fff; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">HIVE</div>
            <div class="tagline">Your Swarm. Your Rules.</div>
        </div>
        <div class="pods-area">
            <div class="pods-container">
                <div class="row">
                    <div class="pod grok">
                        <div class="pod-name">Grok</div>
                        <div class="pod-company">xAI</div>
                    </div>
                    <div class="pod gemini">
                        <div class="pod-name">Gemini</div>
                        <div class="pod-company">Google</div>
                    </div>
                </div>
                <div class="row">
                    <div class="pod sonar">
                        <div class="pod-name">Sonar</div>
                        <div class="pod-company">Perplexity</div>
                    </div>
                    <div class="pod claude">
                        <div class="pod-name">Claude</div>
                        <div class="pod-company">Anthropic</div>
                    </div>
                </div>
                <div class="blend-pod pod">
                    <div class="pod-name">BLEND</div>
                    <div class="pod-company">Synthesis</div>
                </div>
            </div>
        </div>
        <div class="input-bar">
            <div class="input-inner">
                <input placeholder="Ask a stupid question..." />
                <button>➤</button>
            </div>
        </div>
    </div>
</body>
</html>
